<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GitHub Issues Tracker</title>


<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-white mx-[150px] my-[70px]">


<nav class="flex justify-between items-center bg-white p-4 shadow-md rounded-md">
  
  <div class="flex items-center gap-3">
    <img src="assets/github-logo.png" class="w-10" alt="">
    <h2 class="text-xl font-semibold">GitHub Issues Tracker</h2>
  </div>

  <div class="flex gap-2">
    <input type="text" id="searchInput" placeholder="Search issues..."
      class="border border-gray-300 rounded-md px-3 py-2">
    <button onclick="searchIssues()" 
      class="bg-purple-700 text-white px-4 py-2 rounded-md">
      Search
    </button>
  </div>

</nav>


<div class="mt-8 flex gap-3">
  <button id="allBtn" onclick="setActive('allBtn'); loadIssues()"
    class="px-5 py-2 rounded-md bg-purple-700 text-white">All</button>

  <button id="openBtn" onclick="setActive('openBtn'); filterIssues('open')"
    class="px-5 py-2 rounded-md bg-gray-200">Open</button>

  <button id="closedBtn" onclick="setActive('closedBtn'); filterIssues('closed')"
    class="px-5 py-2 rounded-md bg-gray-200">Closed</button>
</div>


<div class="mt-5 flex justify-between items-center bg-gray-100 rounded-xl p-5 mb-5">

  <div class="flex items-center gap-4">
    <img src="assets/Aperture.png" class="w-12">
    <div>
      <h3 id="issueCount" class="text-xl font-bold">50 Issues</h3>
      <p class="text-gray-600">Track and manage your project issues</p>
    </div>
  </div>

  <div class="flex gap-6 text-gray-700 font-medium">

    <span onclick="filterIssues('open')" class="cursor-pointer flex items-center gap-1">
      <span class="w-3 h-3 bg-green-600 rounded-full"></span> Open
    </span>

    <span onclick="filterIssues('closed')" class="cursor-pointer flex items-center gap-1">
      <span class="w-3 h-3 bg-purple-600 rounded-full"></span> Closed
    </span>

  </div>
</div>


<div id="loading" class="text-center hidden text-lg text-gray-600 mt-4">
  Loading...
</div>


<div id="issuesContainer" class="grid grid-cols-4 gap-5 mt-6"></div>


<div id="Modal" class="hidden fixed top-0 left-0 w-full h-full bg-black bg-opacity-60">

  <div class="bg-white w-[600px] mx-auto mt-32 p-8 rounded-lg relative">
    <span onclick="closeModal()" class="absolute right-4 top-3 text-2xl cursor-pointer">&times;</span>
    <div id="modalBody"></div>
  </div>

</div>

<script src="./sciprt.js"></script>
</body>
</html>
